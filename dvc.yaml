# dvc.yaml
# Reproducible pipeline from raw CSVs to final results.
# Run: dvc repro
#
# Stage naming convention mirrors src/ directory structure:
#   audit/         → lumiere_audit
#   preprocessing/ → dataset_builder, features_builder
#   validation/    → dataset_validator, features_validator, graphs_validator
#   graphs/        → graph_builder
#   training/      → run_lgbm_baseline, run_lr_baseline, run_lstm_baseline, run_gnn
#   uncertainty/   → conformal_runner
#
# Stages marked ⏳ are not yet implemented and are commented out.
# Uncomment each stage as the corresponding step is implemented.

stages:

  # ---------------------------------------------------------------------------
  # Step 0 — Audit ✅
  # ---------------------------------------------------------------------------
  lumiere_audit:
    cmd: uv run -m src.audit.lumiere_audit
    deps:
      - data/raw/lumiere/
      - src/audit/lumiere_audit.py
      - src/utils/lumiere_io.py
    outs:
      - data/processed/audit/dataset_stats.json

  # ---------------------------------------------------------------------------
  # Step 1 — Preprocessing ✅
  # ---------------------------------------------------------------------------
  dataset_builder:
    cmd: uv run -m src.preprocessing.dataset_builder
    deps:
      - data/raw/lumiere/
      - src/preprocessing/dataset_builder.py
      - src/utils/lumiere_io.py
    outs:
      - data/processed/preprocessing/dataset_paired.parquet
      - data/processed/preprocessing/dataset_builder_report.json

  dataset_validator:
    cmd: uv run -m src.validation.dataset_validator
    deps:
      - data/processed/preprocessing/dataset_paired.parquet
      - src/validation/dataset_validator.py
      - src/utils/lumiere_io.py
    outs:
      - data/processed/validation/dataset_validator_report.json

  # ---------------------------------------------------------------------------
  # Step 2 — Feature Engineering ✅
  # ---------------------------------------------------------------------------
  features_builder:
    cmd: uv run -m src.preprocessing.features_builder
    deps:
      - data/processed/preprocessing/dataset_paired.parquet
      - data/processed/validation/dataset_validator_report.json
      - src/preprocessing/features_builder.py
      - src/utils/lumiere_io.py
      - configs/features_builder.yaml
    outs:
      - data/processed/preprocessing/dataset_engineered.parquet
      - data/processed/preprocessing/features_builder_report.json

  features_validator:
    cmd: uv run -m src.validation.features_validator
    deps:
      - data/processed/preprocessing/dataset_engineered.parquet
      - src/validation/features_validator.py
      - src/utils/lumiere_io.py
    outs:
      - data/processed/validation/features_validator_report.json

  # ---------------------------------------------------------------------------
  # Step 3 — Baseline Models ✅
  # Three independent runners; only lgbm produces selected_features.yaml.
  # Feature selection cache (data/processed/feature_selection_cache/) is in
  # .dvcignore — expensive to recompute, safe to keep across runs.
  # ---------------------------------------------------------------------------

  run_lgbm_baseline:
    cmd: uv run -m src.training.run_lgbm_baseline
    deps:
      - data/processed/preprocessing/dataset_engineered.parquet
      - data/processed/validation/features_validator_report.json
      - src/models/lgbm_baseline.py
      - src/training/run_lgbm_baseline.py
      - src/training/feature_selector.py
      - src/training/cross_validation.py
      - src/training/training_utils.py
      - src/training/metrics.py
      - src/utils/lumiere_io.py
      - configs/lgbm_baseline.yaml
      - configs/random_state.yaml
    outs:
      - configs/selected_features.yaml
      - data/processed/baselines/fold_stability.json
      - data/processed/interpretability/shap_top20.csv
      - data/processed/interpretability/shap_beeswarm.png
    metrics:
      - data/processed/baselines/lgbm_A_results.json:
          cache: false
      - data/processed/baselines/lgbm_B_results.json:
          cache: false
      - data/processed/baselines/lgbm_C_results.json:
          cache: false
      - data/processed/baselines/lgbm_D_results.json:
          cache: false

  run_lr_baseline:
    cmd: uv run -m src.training.run_logistic_baseline
    deps:
      - data/processed/preprocessing/dataset_engineered.parquet
      - data/processed/validation/features_validator_report.json
      - src/models/logistic_baseline.py
      - src/training/run_logistic_baseline.py
      - src/training/feature_selector.py
      - src/training/cross_validation.py
      - src/training/training_utils.py
      - src/training/metrics.py
      - src/utils/lumiere_io.py
      - configs/logistic_baseline.yaml
      - configs/random_state.yaml
    metrics:
      - data/processed/baselines/lr_results.json:
          cache: false

  run_lstm_baseline:
    cmd: uv run -m src.training.run_lstm_baseline
    deps:
      - data/processed/preprocessing/dataset_engineered.parquet
      - data/processed/validation/features_validator_report.json
      - src/models/lstm_baseline.py
      - src/training/run_lstm_baseline.py
      - src/training/feature_selector.py
      - src/training/cross_validation.py
      - src/training/training_utils.py
      - src/training/metrics.py
      - src/utils/lumiere_io.py
      - configs/lstm_baseline.yaml
      - configs/random_state.yaml
    metrics:
      - data/processed/baselines/lstm_results.json:
          cache: false

  # ---------------------------------------------------------------------------
  # Step 4 — Graph Construction ✅
  # ---------------------------------------------------------------------------

  # 3-node graphs (DeepBraTumIA — primary)
  graph_builder_3node:
    cmd: uv run -m src.graphs.graph_builder --topology 3node
    deps:
      - data/processed/preprocessing/dataset_engineered.parquet
      - data/processed/validation/features_validator_report.json
      - configs/selected_features.yaml
      - src/graphs/graph_builder.py
      - src/utils/lumiere_io.py
    outs:
      - data/processed/graphs/3node/
      - data/processed/graphs/graph_builder_report_3node.json

  # 2-node graphs (HD-GLIO-AUTO — ablation A6)
  graph_builder_2node:
    cmd: uv run -m src.graphs.graph_builder --topology 2node
    deps:
      - data/processed/preprocessing/dataset_engineered.parquet
      - data/processed/validation/features_validator_report.json
      - configs/selected_features.yaml
      - src/graphs/graph_builder.py
      - src/utils/lumiere_io.py
    outs:
      - data/processed/graphs/2node/
      - data/processed/graphs/graph_builder_report_2node.json

  # Validator — 3-node (blocks GNN training)
  graphs_validator_3node:
    cmd: uv run -m src.validation.graphs_validator --topology 3node
    deps:
      - data/processed/graphs/3node/
      - src/validation/graphs_validator.py
      - src/utils/lumiere_io.py
    outs:
      - data/processed/validation/graphs_validator_report_3node.json

  # Validator — 2-node (warning-level; does not block primary GNN)
  graphs_validator_2node:
    cmd: uv run -m src.validation.graphs_validator --topology 2node
    deps:
      - data/processed/graphs/2node/
      - src/validation/graphs_validator.py
      - src/utils/lumiere_io.py
    outs:
      - data/processed/validation/graphs_validator_report_2node.json

